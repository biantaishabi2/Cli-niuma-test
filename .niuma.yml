ai:
  default: kimi
  providers:
    kimi:
      cmd: "kimi --quiet -p {prompt_file}"
      cmd_agent: "kimi --quiet -w {workdir} -p {prompt_file}"
  implementation:
    provider: kimi

daemon:
  poll_interval: "15s"
  max_concurrent: 1
  tracker: "github"
  github:
    owner: "biantaishabi2"
    project_number: 2
